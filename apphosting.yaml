# The name of the backend resource.
run:
  # The name of the Cloud Run service that will be created.
  serviceId: smartpig-lite
  # The region to deploy the service to.
  region: us-central1
  # The availability of the Cloud Run service.
  # "public" makes the service available to the internet.
  ingress: public
  # The environment variables to set for the Cloud Run service.
  environmentVariables:
    GEMINI_API_KEY: "AIzaSyD3TdAFwymZzevFIIKopTd4FMQ4ZXcjDiU"
# The build commands to run to build the backend.
build:
  # The command to run to build the backend.
  run: npm run build
# The settings for the Next.js framework.
nextjs: {}
